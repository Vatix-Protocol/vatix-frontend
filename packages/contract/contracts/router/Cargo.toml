[package]
name = "router"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["lib", "cdylib"]
doctest = false

[dependencies]
soroban-sdk = { workspace = true }

[dev-dependencies]
soroban-sdk = { workspace = true, features = ["testutils"] }
cl-pool = { path = "../cl-pool", features = ["testutils"] }
pool-factory = { path = "../pool-factory", features = ["testutils"] }
